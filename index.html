<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My Portfolio Website">
    <title>My Portfolio</title>
    <!-- Google Fonts: JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="#welcome" class="nav-link active">Home</a></li>
            <li><a href="#about" class="nav-link">About</a></li>
            <li><a href="#projects" class="nav-link">Projects</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section id="welcome" class="section-container">
            <div class="welcome-content">
                <p>Welcome to my test website!</p>
                <p>&nbsp;</p>
                <p>Soon it'll be so pretty :3</p>
            </div>
        </section>

        <section id="about" class="section-container bg-alternate">
            <div class="content-wrapper">
                <h2>About Me</h2>
                <p>I am a developer building awesome things.</p>
            </div>
        </section>

        <section id="projects" class="section-container">
            <div class="content-wrapper">
                <h2>My Projects</h2>
                <div class="projects-grid">
                    <div class="project-card">Project 1</div>
                    <div class="project-card">Project 2</div>
                    <div class="project-card">Project 3</div>
                </div>
            </div>
        </section>

        <section id="contact" class="section-container bg-alternate">
            <div class="content-wrapper">
                <h2>Contact</h2>
                <p>Let's get in touch!</p>
            </div>
        </section>
    </main>

    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>
</html>
